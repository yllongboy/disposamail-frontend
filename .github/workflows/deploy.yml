name: Deploy Frontend

on:
  push:
    branches: [release]
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build:prod
        env:
          NG_API_URL: ${{ secrets.NG_API_URL }}
          NG_WS_URL: ${{ secrets.NG_WS_URL }}
          NG_APP_NAME: ${{ secrets.NG_APP_NAME }}
          NG_APP_TAGLINE: ${{ secrets.NG_APP_TAGLINE }}
          NG_APP_URL: ${{ secrets.NG_APP_URL }}
          NG_GA_TRACKING_ID: ${{ secrets.NG_GA_TRACKING_ID }}
          NG_ADSENSE_PUBLISHER_ID: ${{ secrets.NG_ADSENSE_PUBLISHER_ID }}
          NG_ADSENSE_SLOT_ID: ${{ secrets.NG_ADSENSE_SLOT_ID }}
          NG_STORAGE_PREFIX: ${{ secrets.NG_STORAGE_PREFIX }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/frontend/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_DISPOSAEMAIL_DIGITAL_OCEAN }}
          port: 2222
          source: "dist/*"
          target: "/var/www/disposamail"
          strip_components: 1

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_DISPOSAEMAIL_DIGITAL_OCEAN }}
          port: 2222
          script: |
            sudo nginx -t && sudo systemctl reload nginx
