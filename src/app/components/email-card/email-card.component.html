<div class="email-card">
  @if (mode === 'first-visit') {
    <!-- First Visit: Generate controls (lottery animation is in hero) -->
    <div class="first-visit-content">
      <app-inbox-generator
        [demoMode]="true"
        displayMode="controls"
        (generateRequested)="onGenerateClicked()"
        (inboxGenerated)="onInboxGenerated($event)">
      </app-inbox-generator>
    </div>
  } @else if (mode === 'generating') {
    <!-- Generating: Real lottery animation -->
    <div class="generating-content">
      <app-inbox-generator
        [demoMode]="false"
        (inboxGenerated)="onInboxGenerated($event)">
      </app-inbox-generator>
    </div>
  } @else {
    <!-- Email Client Mode -->
    <div class="client-header">
      <div class="client-header-left">
        <span class="active-email">{{ activeInbox?.email }}</span>
        <button class="btn-icon-sm" (click)="copyEmail()" title="Copy to clipboard">
          @if (copied) {
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path></svg>
          }
        </button>
        @if (copied) {
          <span class="copied-label">Copied!</span>
        }
      </div>
      <div class="client-header-right">
        <button class="btn-icon-sm" (click)="refreshEmails()" title="Refresh">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path><path d="M16 16h5v5"></path></svg>
        </button>
        <button class="btn-new-inbox" (click)="onNewInbox()">
          New Inbox
          @if (totalOtherUnread > 0) {
            <span class="inbox-badge">{{ totalOtherUnread > 99 ? '99+' : totalOtherUnread }}</span>
          }
        </button>
        @if (inboxes.length > 1) {
          <app-inbox-dropdown
            [inboxes]="inboxes"
            [activeEmail]="activeInbox?.email || ''"
            [unreadCounts]="unreadCounts"
            (inboxSelected)="onInboxSelected($event)"
            (inboxDeleted)="onInboxDeleted($event)">
          </app-inbox-dropdown>
        }
      </div>
    </div>

    <!-- Email content area -->
    <div class="client-body">
      @if (selectedEmailId) {
        <div class="viewer-bar">
          <button class="btn-back" (click)="closeViewer()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
            Back to Inbox
          </button>
        </div>
        <app-email-viewer [emailId]="selectedEmailId" (closed)="closeViewer()"></app-email-viewer>
      } @else if (activeInbox) {
        <app-email-list [email]="activeInbox.email" (emailSelected)="onEmailSelected($event)"></app-email-list>
      }
    </div>
  }
</div>
